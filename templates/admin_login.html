{% extends "base.html" %}
{% block title %}| 管理者ログイン{% endblock %}

{% block content %}
<div style="max-width:420px;margin:80px auto;padding:0 24px;">
    <div class="card">
        <div class="grad-bar"></div>
        <div class="form-card-title" style="font-family:'Montserrat',sans-serif;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:4px;">
            管理者ログイン
        </div>
        <div class="form-card-sub" style="font-size:13px;color:var(--text-light);margin-bottom:28px;">
            管理者アカウントでログインしてください
        </div>
        <form action="/admin_login" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">ユーザーID</label>
                <input type="text" name="username" class="form-input" placeholder="IDを入力" required>
            </div>
            <div class="form-group">
                <label class="form-label">パスワード</label>
                <input type="password" name="password" class="form-input" placeholder="パスワードを入力" required>
            </div>
            <button type="submit" class="btn btn-navy btn-full">ログイン</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}| ご登録{% endblock %}

{% block nav_links %}
<span style="font-size:13px;color:var(--text-light);">つながる、ひろがる、みつかる。</span>
{% endblock %}

{% block extra_style %}
<style>
.hero {
    text-align: center;
    padding: 64px 24px 40px;
}
.hero-tag {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(244,160,181,0.15), rgba(126,200,227,0.15));
    color: var(--purple);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 20px;
    border: 1px solid rgba(176,136,212,0.25);
}
.hero h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 12px;
}
.hero p {
    color: var(--text-light);
    font-size: 16px;
    margin-bottom: 48px;
}
.forms-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 420px;
    margin: 0 auto;
    padding: 0 24px 80px;
}
.form-card-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 4px;
}
.form-card-sub {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 28px;
}
</style>
{% endblock %}

{% block content %}
<div class="hero">
    <div class="hero-tag"># ネストで繋がろう！！</div>
    <h1>その日、<span class="grad-text">自然に</span>出会える。</h1>
    <p>つながる、ひろがる、みつかる。</p>
</div>

<div class="forms-grid">
    <!-- 登録（名前のみ） -->
    <div class="card">
        <div class="grad-bar"></div>
        <div class="form-card-title">はじめる</div>
        <div class="form-card-sub">お名前を入力するだけで参加できます</div>
        <form action="/register" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">お名前</label>
                <input type="text" name="username" class="form-input" placeholder="お名前を入力" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">はじめる</button>
        </form>
    </div>

    <div style="text-align:center; margin-top:8px;">
        <a href="/admin_login" style="font-size:12px; color:var(--text-light); text-decoration:none;">管理</a>
    </div>
</div>
{% endblock %}
